name: 🧠 NOMOS Intelligence Collection & Generation

# ⭐ AGREGAR ESTO AL INICIO
concurrency:
  group: nomos-collection
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Data source to collect'
        required: true
        type: choice
        options:
          - all
          - google_trends
          - reddit
          - youtube

jobs:
  collect-and-generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --break-system-packages -r requirements.txt
      
      - name: 🔄 Pull latest changes
        run: |
          git config user.name "NOMOS Bot"
          git config user.email "bot@nomos.dev"
          git pull --rebase origin main || true
      
      - name: 📊 Run Google Trends Collection
        if: github.event.inputs.source == 'google_trends' || github.event.inputs.source == 'all' || github.event_name == 'schedule'
        env:
          ENABLE_GOOGLE_TRENDS: true
        run: |
          python run_collection.py --source google_trends --append
        continue-on-error: true
      
      - name: 🔴 Run Reddit Collection
        if: github.event.inputs.source == 'reddit' || github.event.inputs.source == 'all' || github.event_name == 'schedule'
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          ENABLE_REDDIT: true
        run: |
          python run_collection.py --source reddit --append
        continue-on-error: true
      
      - name: ▶️ Run YouTube Collection
        if: github.event.inputs.source == 'youtube' || github.event.inputs.source == 'all' || github.event_name == 'schedule'
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ENABLE_YOUTUBE: true
        run: |
          python run_collection.py --source youtube --append
        continue-on-error: true
      
      - name: ✅ Validate collection results
        run: |
          SIGNALS_FILE="data/raw_signals.json"
          
          if [ ! -f "$SIGNALS_FILE" ]; then
            echo "❌ Error: raw_signals.json not found"
            exit 1
          fi
          
          SIGNAL_COUNT=$(python -c "import json; print(len(json.load(open('$SIGNALS_FILE'))))")
          echo "📊 Total signals collected: $SIGNAL_COUNT"
          
          if [ "$SIGNAL_COUNT" -lt 10 ]; then
            echo "⚠️ Warning: Very low signal count ($SIGNAL_COUNT)"
          else
            echo "✅ Signal count looks good"
          fi
      
      - name: 🧠 Generate Intelligence
        run: |
          python generate_intelligence.py
      
      - name: 💾 Commit and Push
        run: |
          git add data/ nomos_home_intelligence.json
          
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "🧠 Auto-update: Intelligence v4.5 - $TIMESTAMP"
            
            # Retry push con rebase si falla
            MAX_RETRIES=3
            RETRY=0
            
            while [ $RETRY -lt $MAX_RETRIES ]; do
              if git push origin main; then
                echo "✅ Push successful"
                break
              else
                echo "⚠️ Push failed, retrying... ($((RETRY+1))/$MAX_RETRIES)"
                git pull --rebase origin main
                RETRY=$((RETRY+1))
                sleep 5
              fi
            done
            
            if [ $RETRY -eq $MAX_RETRIES ]; then
              echo "❌ Failed to push after $MAX_RETRIES attempts"
              exit 1
            fi
          fi
      
      - name: 📊 Generate Summary
        if: always()
        run: |
          echo "## 🧠 NOMOS Collection Summary v4.5" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "nomos_home_intelligence.json" ]; then
            TOTAL=$(python -c "import json; data=json.load(open('nomos_home_intelligence.json')); print(data['metadata']['total_signals'])" 2>/dev/null || echo "0")
            VERSION=$(python -c "import json; data=json.load(open('nomos_home_intelligence.json')); print(data['metadata']['version'])" 2>/dev/null || echo "unknown")
            TACTICS=$(python -c "import json; data=json.load(open('nomos_home_intelligence.json')); print(len([t for t in data['insights'].values() if t['total_signals'] > 0]))" 2>/dev/null || echo "0")
            
            echo "✅ **Status:** Success" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Total Signals:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Tactics with Data:** $TACTICS/16" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            echo "### 📊 Distribution by Tactic" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            python -c "
import json
try:
    data = json.load(open('nomos_home_intelligence.json'))
    insights = sorted(data['insights'].items(), key=lambda x: x[1]['total_signals'], reverse=True)
    print('| Tactic | Signals |')
    print('|--------|---------|')
    for tactic, info in insights[:10]:
        print(f'| {tactic} | {info[\"total_signals\"]} |')
except Exception as e:
    print(f'Error generating table: {e}')
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** Failed" >> $GITHUB_STEP_SUMMARY
            echo "❌ Intelligence file not generated" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: 📝 Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: collection-logs
          path: |
            data/collection_log.json
            data/raw_signals.json
          retention-days: 7

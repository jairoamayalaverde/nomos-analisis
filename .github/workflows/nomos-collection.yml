name: NOMOS Collection & Intelligence v2

on:
  schedule:
    # Runs daily at 6 AM Colombia time (11 AM UTC)
    - cron: '0 11 * * *'
  
  workflow_dispatch:  # Manual trigger
    inputs:
      source:
        description: 'Collection source'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - google_trends
          - reddit

jobs:
  collect-and-generate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      # ============================================
      # SETUP
      # ============================================
      
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      # ============================================
      # COLLECTION - Google Trends
      # ============================================
      
      - name: Run Google Trends Collection
        if: ${{ github.event.inputs.source == '' || github.event.inputs.source == 'all' || github.event.inputs.source == 'google_trends' }}
        run: |
          python run_collection.py --source google_trends --append
        continue-on-error: true
      
      # ============================================
      # COLLECTION - Reddit
      # ============================================
      
      - name: Run Reddit Collection
        if: ${{ github.event.inputs.source == '' || github.event.inputs.source == 'all' || github.event.inputs.source == 'reddit' }}
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          python run_collection.py --source reddit --append
        continue-on-error: true
      
      # ============================================
      # INTELLIGENCE GENERATION
      # ============================================
      
      - name: Generate Intelligence JSON
        run: |
          python generate_intelligence.py
      
      # ============================================
      # VALIDATION
      # ============================================
      
      - name: Validate JSON Structure
        run: |
          python -c "
          import json
          import sys
          
          # Load and validate JSON
          with open('nomos_home_intelligence.json', 'r') as f:
              data = json.load(f)
          
          # Check required fields
          assert 'insights' in data, 'Missing insights key'
          assert 'metadata' in data, 'Missing metadata key'
          assert 'total_signals' in data['metadata'], 'Missing total_signals'
          assert 'version' in data['metadata'], 'Missing version'
          
          # Check all 16 tactics are present
          expected_tactics = [
              'web_no_convierte', 'autoridad_sector', 'dominio_local', 'superar_competencia',
              'ideas_sin_plan', 'proyectos_estancados', 'mensaje_confuso', 'embudo_desordenado',
              'marca_no_escala', 'modernizacion_rapida', 'metodo_equipo', 'servicios_premium',
              'escalar_contenido', 'estetica_visual', 'ads_convertir', 'automatizacion'
          ]
          
          for tactic in expected_tactics:
              assert tactic in data['insights'], f'Missing tactic: {tactic}'
              insight = data['insights'][tactic]
              assert 'top_insight' in insight, f'Missing top_insight for {tactic}'
              assert 'total_signals' in insight, f'Missing total_signals for {tactic}'
              assert 'prevalence' in insight, f'Missing prevalence for {tactic}'
              assert 'diagnosis' in insight, f'Missing diagnosis for {tactic}'
          
          print('✅ JSON structure is valid')
          print(f'✅ Total signals: {data[\"metadata\"][\"total_signals\"]}')
          print(f'✅ Version: {data[\"metadata\"][\"version\"]}')
          "
      
      # ============================================
      # COMMIT & PUSH
      # ============================================
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet nomos_home_intelligence.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit JSON to repo
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "NOMOS Bot"
          git add nomos_home_intelligence.json
          git add data/raw_signals.json
          git add data/collection_log.json
          git commit -m "🧠 Auto-update: Intelligence v4.2 - $(date +'%Y-%m-%d %H:%M UTC')"
      
      - name: Push changes
        if: steps.check_changes.outputs.changed == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
      
      # ============================================
      # SUMMARY & NOTIFICATIONS
      # ============================================
      
      - name: Generate Summary
        if: always()
        run: |
          echo "## 🧠 NOMOS Collection Summary v4.2" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f nomos_home_intelligence.json ]; then
            TOTAL_SIGNALS=$(python -c "import json; data=json.load(open('nomos_home_intelligence.json')); print(data['metadata']['total_signals'])")
            VERSION=$(python -c "import json; data=json.load(open('nomos_home_intelligence.json')); print(data['metadata']['version'])")
            TACTICS_WITH_DATA=$(python -c "import json; data=json.load(open('nomos_home_intelligence.json')); print(data['metadata'].get('tactics_with_data', 'N/A'))")
            
            echo "✅ **Status:** Success" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Total Signals:** $TOTAL_SIGNALS" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Tactics with Data:** $TACTICS_WITH_DATA/16" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Distribution table
            echo "### 📊 Distribution by Tactic" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python -c "
import json
data = json.load(open('nomos_home_intelligence.json'))
insights = data['insights']
distribution = [(tid, d['total_signals']) for tid, d in insights.items()]
distribution.sort(key=lambda x: x[1], reverse=True)

print('| Tactic | Signals |')
print('|--------|---------|')
for tactic_id, count in distribution[:10]:
    print(f'| {tactic_id} | {count} |')
" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** Failed" >> $GITHUB_STEP_SUMMARY
            echo "❌ Intelligence JSON was not generated" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generated at $(date +'%Y-%m-%d %H:%M:%S UTC')*" >> $GITHUB_STEP_SUMMARY
      
      # ============================================
      # CLEANUP (Optional)
      # ============================================
      
      - name: Archive collection logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: collection-logs
          path: data/collection_log.json
          retention-days: 30

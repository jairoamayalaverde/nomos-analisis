name: NOMOS Collection & Intelligence v2

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Collection source'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - google_trends
          - reddit
          - youtube

jobs:
  collect-and-generate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      # ============================================
      # COLLECTION - Google Trends
      # ============================================
      
      - name: Run Google Trends Collection
        if: ${{ github.event.inputs.source == '' || github.event.inputs.source == 'all' || github.event.inputs.source == 'google_trends' }}
        run: |
          python run_collection.py --source google_trends --append
        continue-on-error: true
      
      # ============================================
      # COLLECTION - Reddit
      # ============================================
      
      - name: Run Reddit Collection
        if: ${{ github.event.inputs.source == '' || github.event.inputs.source == 'all' || github.event.inputs.source == 'reddit' }}
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          python run_collection.py --source reddit --append
        continue-on-error: true
      
      # ============================================
      # COLLECTION - YouTube
      # ============================================
      
      - name: Run YouTube Collection
        if: ${{ github.event.inputs.source == '' || github.event.inputs.source == 'all' || github.event.inputs.source == 'youtube' }}
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python run_collection.py --source youtube --append
        continue-on-error: true
      
      # ============================================
      # INTELLIGENCE GENERATION
      # ============================================
      
      - name: Generate Intelligence JSON
        run: |
          python generate_intelligence.py
      
      - name: Validate JSON Structure
        run: |
          python -c '
          import json
          
          with open("nomos_home_intelligence.json", "r") as f:
              data = json.load(f)
          
          assert "insights" in data
          assert "metadata" in data
          assert "total_signals" in data["metadata"]
          assert "version" in data["metadata"]
          
          expected_tactics = [
              "web_no_convierte", "autoridad_sector", "dominio_local", "superar_competencia",
              "ideas_sin_plan", "proyectos_estancados", "mensaje_confuso", "embudo_desordenado",
              "marca_no_escala", "modernizacion_rapida", "metodo_equipo", "servicios_premium",
              "escalar_contenido", "estetica_visual", "ads_convertir", "automatizacion"
          ]
          
          for tactic in expected_tactics:
              assert tactic in data["insights"]
              insight = data["insights"][tactic]
              assert "top_insight" in insight
              assert "total_signals" in insight
              assert "prevalence" in insight
              assert "diagnosis" in insight
          
          print("JSON structure is valid")
          metadata = data["metadata"]
          print("Total signals:", metadata["total_signals"])
          print("Version:", metadata["version"])
          '
      
      # ============================================
      # COMMIT & PUSH
      # ============================================
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet nomos_home_intelligence.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "NOMOS Bot"
          git add nomos_home_intelligence.json
          git add data/raw_signals.json || true
          git add data/collection_log.json || true
          git commit -m "🧠 Auto-update: Intelligence v4.3 - $(date +'%Y-%m-%d %H:%M UTC')"
      
      - name: Push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git pull --rebase origin main || true
          git push origin main
      
      # ============================================
      # SUMMARY
      # ============================================
      
      - name: Generate Summary
        if: always()
        run: |
          echo "## 🧠 NOMOS Collection Summary v4.3" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f nomos_home_intelligence.json ]; then
            TOTAL_SIGNALS=$(python -c "import json; data=json.load(open('nomos_home_intelligence.json')); print(data.get('metadata', {}).get('total_signals', 0))")
            VERSION=$(python -c "import json; data=json.load(open('nomos_home_intelligence.json')); print(data.get('metadata', {}).get('version', 'unknown'))")
            TACTICS_WITH_DATA=$(python -c "import json; data=json.load(open('nomos_home_intelligence.json')); print(data.get('metadata', {}).get('tactics_with_data', 'N/A'))")
            
            echo "✅ **Status:** Success" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Total Signals:** $TOTAL_SIGNALS" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Tactics with Data:** $TACTICS_WITH_DATA/16" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            echo "### 📊 Distribution by Tactic" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Tactic | Signals |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
            
            python -c "
          import json
          data = json.load(open('nomos_home_intelligence.json'))
          insights = data['insights']
          distribution = [(tid, d['total_signals']) for tid, d in insights.items()]
          distribution.sort(key=lambda x: x[1], reverse=True)
          for tactic_id, count in distribution[:10]:
              print(f'| {tactic_id} | {count} |')
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** Failed" >> $GITHUB_STEP_SUMMARY
            echo "❌ Intelligence JSON was not generated" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generated at $(date +'%Y-%m-%d %H:%M:%S UTC')*" >> $GITHUB_STEP_SUMMARY
